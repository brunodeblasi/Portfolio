{{- $title := .Get "title" -}}
{{- $url := .Get "url" -}}
{{- $description := .Get "description" -}}
{{- $tag := .Get "tag" -}}

<a href="{{ $url }}" target="_blank" rel="noopener noreferrer"
   class="group not-prose relative flex flex-col gap-2 rounded-lg border border-neutral-300 dark:border-neutral-600 p-4 transition-all duration-200 hover:border-primary-400 dark:hover:border-primary-500 hover:shadow-md hover:-translate-y-0.5 bg-transparent">

  <div class="flex items-start justify-between gap-2">
    <span class="text-base font-semibold text-neutral-800 dark:text-neutral-100 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors leading-snug">
      {{ $title }}
    </span>
    <span class="shrink-0 text-neutral-400 dark:text-neutral-500 text-sm mt-0.5">&#8599;</span>
  </div>

  {{- if $description }}
  <p class="text-sm text-neutral-500 dark:text-neutral-400 leading-relaxed m-0">
    {{ $description }}
  </p>
  {{- end }}

  {{- if $tag }}
  <span class="flex flex-wrap gap-1">
    {{- range (split $tag ",") }}
    <span class="rounded-md border border-primary-400 px-1 py-[1px] text-xs font-normal text-primary-700 dark:border-primary-600 dark:text-primary-400">{{ trim . " " }}</span>
    {{- end }}
  </span>
  {{- end }}
</a>
